<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Martin Mega Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Martin Mega Bingo</h1>

    <div class="top-controls">
      <button onclick="generateBoard()">New Card</button>
      <button onclick="drawNumber()">Draw Number</button>
      <button onclick="resetGame()">Reset</button>
    </div>

    <div class="current-number">
      Current Number:
      <span id="called-number">--</span>
    </div>

    <div class="called-section">
      <h2>Called Numbers</h2>
      <div id="called-list" class="called-list"></div>
    </div>

    <div id="board" class="board"></div>

    <div id="win-message" class="win-message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
